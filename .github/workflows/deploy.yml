name: Deploy Limpia MAX

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to GoDaddy via SFTP
        run: node deploy.mjs
        env:
          SFTP_KEY: ${{ secrets.GODADDY_SSH_KEY }}
          SFTP_USER: "client_7099bf3c0_1103883"
          SFTP_HOST: "r5l.550.myftpupload.com"
          SFTP_PORT: "22"
